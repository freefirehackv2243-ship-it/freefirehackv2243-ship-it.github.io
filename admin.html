<!DOCTYPE html>
<html>
<head>
<title>Ultra Admin Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* Sidebar */
.sidebar{
position:fixed;
width:220px;
height:100%;
background:#020617;
padding:20px;
}

.sidebar h2{
color:#00f2ff;
}

.sidebar button{
width:100%;
margin:10px 0;
padding:10px;
background:#111827;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* Main */
.main{
margin-left:240px;
padding:20px;
}

/* Card */
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

/* Inputs */
input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

/* Button */
.btn{
background:#00f2ff;
color:black;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.videoCard{
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

img{
width:100%;
height:150px;
object-fit:cover;
}

video{
width:100%;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>🔥 Admin</h2>
<button onclick="show('upload')">Upload</button>
<button onclick="show('videos')">All Videos</button>
</div>

<!-- Main -->
<div class="main">
