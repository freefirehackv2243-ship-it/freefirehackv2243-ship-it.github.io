<!DOCTYPE html>
<html>
<head>
  <title>🔥 VideoHub Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{background:#0d0d0d;color:#fff;font-family:sans-serif;margin:0}
    header{padding:15px;text-align:center;color:#ff3d00;font-size:22px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:10px}
    .card{background:#1a1a1a;border-radius:10px;overflow:hidden;cursor:pointer}
    .card img{width:100%;height:120px;object-fit:cover}
    .title{padding:6px;font-size:14px}
  </style>
</head>

<body>

<header>🔥 VideoHub Pro</header>

<div class="grid" id="videos"></div>

<script>
let videos = JSON.parse(localStorage.getItem("videos"));

// 👉 FIX: if empty, add demo video
if(!videos || videos.length === 0){
  videos = [
    {
      title:"Demo Video",
      src:"https://www.w3schools.com/html/mov_bbb.mp4",
      thumb:"https://picsum.photos/300/200"
    }
  ];
  localStorage.setItem("videos", JSON.stringify(videos));
}

let container = document.getElementById("videos");

videos.forEach((v,i)=>{
  container.innerHTML += `
    <div class="card" onclick="openVideo(${i})">
      <img src="${v.thumb}">
      <div class="title">${v.title}</div>
    </div>
  `;
});

function openVideo(i){
  location.href = "player.html?id=" + i;
}
</script>

</body>
</html>
