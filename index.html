<!DOCTYPE html>
<html>
<head>

<!-- AGE CHECK -->
<script>
if(localStorage.getItem("age")!="yes"){
window.location.href="age.html";
}
</script>

<title>UltraTube Pro</title>

<!-- 🔥 EXOCLICK SCRIPTS (LOAD BOTH) -->
<script async src="https://a.magsrv.com/ad-provider.js"></script>
<script async src="https://a.pemsrv.com/ad-provider.js"></script>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:Arial;}
.header{padding:10px;background:#111;display:flex;justify-content:space-between;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px;}
.card{background:#1a1f2e;border-radius:10px;overflow:hidden;cursor:pointer;}
img{width:100%;height:150px;object-fit:cover;}
.player{display:none;padding:15px;}
video{width:100%;border-radius:10px;}
button{padding:8px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.like{background:red;color:white;}
.comment{background:#1a1f2e;margin:5px;padding:5px;border-radius:5px;}
.banner{text-align:center;margin:10px 0;}
</style>

</head>

<body>

<div class="header">
<h2>🔥 UltraTube</h2>
<button onclick="back()">⬅ Back</button>
</div>

<!-- 🔥 TOP ADS -->
<div class="banner">

<!-- OLD ZONES -->
<ins class="eas6a97888e42" data-zoneid="5875104"></ins>
<ins class="eas6a97888e2" data-zoneid="5875106"></ins>
<ins class="eas6a97888e6" data-zoneid="5875124"></ins>

<!-- 🆕 NEW PEMSRV ZONE -->
<ins class="eas6a97888e35" data-zoneid="5875136"></ins>

</div>

<!-- HOME -->
<div id="home" class="grid"></div>

<!-- PLAYER -->
<div id="player" class="player">

<video id="video" controls></video>
<h3 id="title"></h3>

<!-- 🔥 VIDEO ADS -->
<div class="banner">

<ins class="eas6a97888e42" data-zoneid="5875104"></ins>
<ins class="eas6a97888e2" data-zoneid="5875106"></ins>
<ins class="eas6a97888e6" data-zoneid="5875124"></ins>

<!-- 🆕 NEW -->
<ins class="eas6a97888e35" data-zoneid="5875136"></ins>

</div>

<button class="like" onclick="like()">❤️ <span id="likeCount">0</span></button>

<br>

<input id="commentInput" placeholder="Comment..." style="width:70%">
<button onclick="comment()">Post</button>

<div id="comments"></div>

<h3>🔥 Next Videos</h3>
<div id="related" class="grid"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "protube-4ea04.firebaseapp.com",
databaseURL: "https://protube-4ea04-default-rtdb.firebaseio.com",
projectId: "protube-4ea04"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let videos={}, currentId=null;

/* LOAD */
db.ref("videos").on("value",snap=>{
videos=snap.val()||{};
showHome();
});

/* HOME */
function showHome(){
let html="";
for(let id in videos){
let v=videos[id];
html+=`
<div class="card" onclick="play('${id}')">
<img src="${v.thumb}">
<h4>${v.title}</h4>
</div>`;
}
document.getElementById("home").innerHTML=html;
}

/* PLAY */
function play(id){
currentId=id;

/* 🔥 FORCE ADS */
(AdProvider = window.AdProvider || []).push({"serve": {}});

let v=videos[id];
document.getElementById("home").style.display="none";
document.getElementById("player").style.display="block";

startVideo(v);
}

/* VIDEO */
function startVideo(v){
let video=document.getElementById("video");
video.src=v.url;

video.play().catch(()=>{
video.muted=true;
video.play();
});

document.getElementById("title").innerText=v.title;
document.getElementById("likeCount").innerText=v.likes||0;

video.onended=()=>autoNext();

loadComments();
loadRelated(currentId);
}

/* BACK */
function back(){
document.getElementById("player").style.display="none";
document.getElementById("home").style.display="grid";
}

/* LIKE */
function like(){
db.ref("videos/"+currentId+"/likes").transaction(v=>(v||0)+1);
}

/* COMMENT */
function comment(){
let txt=document.getElementById("commentInput").value;
if(!txt)return;
db.ref("comments/"+currentId).push({text:txt});
document.getElementById("commentInput").value="";
}

/* COMMENTS */
function loadComments(){
db.ref("comments/"+currentId).on("value",snap=>{
let data=snap.val()||{};
let html="";
for(let i in data){
html+=`<div class="comment">${data[i].text}</div>`;
}
document.getElementById("comments").innerHTML=html;
});
}

/* RELATED */
function loadRelated(current){
let html="";
for(let id in videos){
if(id!==current){
let v=videos[id];
html+=`
<div class="card" onclick="play('${id}')">
<img src="${v.thumb}">
<h4>${v.title}</h4>
</div>`;
}
}
document.getElementById("related").innerHTML=html;
}

/* AUTO NEXT */
function autoNext(){
let keys=Object.keys(videos);
let next=keys[Math.floor(Math.random()*keys.length)];
play(next);
}

/* 🔥 LOAD ADS */
window.onload = function(){
setTimeout(()=>{
(AdProvider = window.AdProvider || []).push({"serve": {}});
},2000);
};

/* 🔥 CLICK ADS */
document.addEventListener("click", function(){
(AdProvider = window.AdProvider || []).push({"serve": {}});
});

/* 🔥 AUTO REFRESH */
setInterval(()=>{
(AdProvider = window.AdProvider || []).push({"serve": {}});
},15000);

</script>

</body>
</html>
